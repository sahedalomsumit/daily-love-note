name: Deploy to Firebase and GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Build Frontend
        working-directory: client
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://daily-love-note.web.app/api
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}

      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --json --token ${{ secrets.FIREBASE_TOKEN }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
