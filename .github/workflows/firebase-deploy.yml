name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Frontend
        working-directory: client
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: /api
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}

      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --json --token ${{ secrets.FIREBASE_TOKEN }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
